services:
    laravel-ai:
      build:
        context: .
        dockerfile: Dockerfile
      image: laravel-ai:latest
      container_name: laravel-ai
      hostname: laravel-ai
      pull_policy: build
      restart: always
      volumes:
        - .:/var/www/html
      healthcheck:
        test: [ "CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\" || exit 1" ]
        interval: 3s
        timeout: 3s
        retries: 20
        start_period: 20s
      networks:
        - docker_containers

    laravel-ai-nginx:
      image: nginx:alpine
      #    pull_policy: always
      container_name: laravel-ai-nginx
      ports:
        - "83:80"
      volumes:
        - .:/var/www/html:ro
        - ./configuration/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:
        laravel-ai:
          condition: service_healthy
      networks:
        - docker_containers

networks:
    docker_containers:
        name: docker_containers
        driver: bridge
        external: true
